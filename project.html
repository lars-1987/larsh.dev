<style>
/* project detail page-specific */
.proj-head{padding:150px 0 0}
.proj-head .row{display:grid;grid-template-columns:1fr 360px;align-items:end;gap:32px}
.proj-head h1{font-weight:600;font-size:clamp(40px,7.5vw,88px);letter-spacing:-.025em;line-height:.95}
.proj-head .lede{color:var(--mut);font-size:clamp(15px,1.4vw,18px);line-height:1.5}
.metaband{display:flex;flex-wrap:wrap;align-items:flex-end;gap:32px 48px;margin-top:44px;
  padding-top:24px;border-top:1px solid var(--hair)}
.metaband .pair{display:flex;flex-direction:column;gap:6px}
.metaband .k{font-size:10px;letter-spacing:.08em;color:var(--mut)}
.metaband .v{font-size:16px;max-width:520px}
.metaband .visit{margin-left:auto}
.hero-shot{border-radius:20px;overflow:hidden;aspect-ratio:1180/740;margin-top:40px}
.hero-shot img{width:100%;height:100%;object-fit:cover}
/* phone apps: screenshots shown contained on a coloured band, not cropped landscape */
.phones{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;border-radius:20px;
  padding:48px 24px;margin-top:40px}
.phones img{height:min(560px,64vh);width:auto;border-radius:26px;box-shadow:0 20px 50px rgba(0,0,0,.22)}
.body{padding:80px 0 40px}
.blk{max-width:740px;margin:0 auto 60px;padding:0}
.blk:last-child{margin-bottom:0}
.blk h2{font-weight:600;font-size:clamp(28px,3.4vw,40px);letter-spacing:-.015em;margin-bottom:20px}
.blk p{font-size:clamp(16px,1.5vw,18px);line-height:1.6;letter-spacing:-.005em;color:rgba(17,17,17,.82)}
.blk p code{font-family:'Martian Mono',monospace;font-size:.85em;background:rgba(17,17,17,.06);
  padding:1px 6px;border-radius:5px}
.shot{border-radius:18px;overflow:hidden;margin:0 auto 60px}
.shot.full{aspect-ratio:1180/740}
.shot.full img,.pairimg img{width:100%;height:100%;object-fit:cover}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:0 auto 60px}
.pairimg{border-radius:16px;overflow:hidden;aspect-ratio:582/368}
.more{padding:60px 0 100px;border-top:1px solid var(--hair)}
.more .h2row{margin-bottom:40px}
@media (max-width:1023px){
  .proj-head{padding:130px 0 0}
  .proj-head .row{grid-template-columns:1fr;gap:16px;align-items:start}
  .metaband .visit{margin-left:0;flex-basis:100%}
}
@media (max-width:560px){
  .proj-head{padding:112px 0 0}
  .pair{grid-template-columns:1fr}
  .body{padding:56px 0 32px}
}
</style>
</head>

<script>
(() => {
  const BUILD = ['sanctumpdf','metastrip','renew','bedcheck','swatch','fenced','vesper','virtus','helio','larshdev'];
  // card presentation not stored in projects.js: short desc + panel treatment
  const CARD = {
    sanctumpdf:{img:'sanctum-preview.webp',d:'In-browser PDF conversion',st:'SHIPPED'},
    metastrip:{img:'metastrip-preview.webp',d:'Zero-server metadata removal',st:'OPEN SOURCE'},
    renew:{img:'renew-preview.webp',d:'AI skincare tracking for iOS',st:'SHIPPED'},
    bedcheck:{img:'bedcheck-preview.webp',d:'Bedtime accountability for iOS',st:'IN DEV · ALPHA'},
    swatch:{img:'tryswatch-preview.webp',d:'A colour-palette studio for the browser',st:'SHIPPED'},
    fenced:{img:'fenced1.webp',d:'Markdown to self-contained HTML',st:'OPEN SOURCE'},
    vesper:{img:'vesper1.webp',d:'Multilingual scripture app for iOS',st:'SHIPPED',pane:'#212333'},
    virtus:{img:'virtus1.webp',d:'Stoic daily wisdom, fully on-device',st:'SHIPPED',pane:'#D4CCBD'},
    helio:{img:'helio1.webp',d:'Project cockpit for macOS',st:'IN DEVELOPMENT'},
    larshdev:{img:'larshdev-1.webp',d:'An alternative take on this site',st:'EXPERIMENT'}
  };
  const byId = Object.fromEntries((window.PROJECTS || []).map(p => [p.id, p]));
  const params = new URLSearchParams(location.search);
  let id = params.get('id');
  if (!byId[id]) id = 'sanctumpdf';
  const p = byId[id];
  document.title = `${p.name} — Lars Holmström`;

  const asset = f => '/assets/' + f.replace(/^assets\//, '');
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  const pane = CARD[id] && CARD[id].pane;      // phone-only apps get a coloured band
  const shots = (p.shots || []).slice();
  // landscape hero: preview if present, else first (landscape) shot
  let heroImg = pane ? null : (p.preview ? asset(p.preview) : (shots.length ? asset(shots.shift()) : null));

  // visit link: first link with a real URL
  const live = (p.links || []).find(l => l.h && !l.d);

  // editorial blocks from points[], interleaving remaining shots between them
  let html = '';
  html += `<header class="proj-head" data-r>
    <div class="row">
      <h1>${esc(p.name)}</h1>
      <p class="lede">${p.lede}</p>
    </div>
    <div class="metaband">
      <div class="pair"><span class="k mono">TYPE</span><span class="v">${esc(p.typeLabel)}</span></div>
      <div class="pair"><span class="k mono">STATUS</span><span class="v">${esc(cap(p.status))}</span></div>
      <div class="pair"><span class="k mono">STACK</span><span class="v">${p.tech}</span></div>
      ${live ? `<a class="chip sm visit" href="${live.h}" target="_blank" rel="noopener"><span class="t">Visit site</span><span class="a">→</span></a>` : ''}
    </div>
  </header>`;

  if (pane) {
    html += `<div class="phones" data-r="pop" style="background:${pane}">` +
      (p.shots || []).map(s => `<img src="${asset(s)}" alt="${esc(p.name)} screen" loading="lazy">`).join('') + '</div>';
  } else if (heroImg) {
    html += `<div class="hero-shot" data-r="pop"><img src="${heroImg}" alt="${esc(p.name)}"></div>`;
  }

  html += '<div class="body">';
  const pts = p.points || [];
  pts.forEach((pt, i) => {
    const m = pt.match(/^<strong>([\s\S]*?)<\/strong>\s*([\s\S]*)$/);
    const h = m ? m[1] : '';
    const b = m ? m[2] : pt;
    html += `<section class="blk" data-r>${h ? `<h2>${h}</h2>` : ''}<p>${b}</p></section>`;
    // landscape projects interleave a full-width shot between blocks
    if (!pane && shots.length && i < pts.length - 1) {
      html += `<div class="shot full" data-r="pop"><img src="${asset(shots.shift())}" alt="${esc(p.name)} screenshot" loading="lazy"></div>`;
    }
  });
  // any leftover landscape shots → pair grid
  while (!pane && shots.length) {
    const a = shots.shift(), b = shots.shift();
    html += `<div class="pair">
      <div class="pairimg" data-r="pop"><img src="${asset(a)}" alt="${esc(p.name)} screenshot" loading="lazy"></div>
      ${b ? `<div class="pairimg" data-r="pop"><img src="${asset(b)}" alt="${esc(p.name)} screenshot" loading="lazy"></div>` : ''}
    </div>`;
  }
  html += '</div>';

  // more projects: next two in the build list
  const idx = BUILD.indexOf(id);
  const more = [BUILD[(idx + 1) % BUILD.length], BUILD[(idx + 2) % BUILD.length]];
  html += `<section class="more"><div class="h2row"><h2>More projects</h2>
    <a class="chip sm" href="./work.html"><span class="t">All projects</span><span class="a">→</span></a></div><div class="pgrid">`;
  more.forEach(mid => {
    const mp = byId[mid], c = CARD[mid];
    html += `<a class="card" href="./project.html?id=${mid}" data-r="pop">
      <div class="ph${c.pane ? ' pane' : ''}"${c.pane ? ` style="background:${c.pane}"` : ''}><img src="/assets/${c.img}" alt="${esc(mp.name)}" loading="lazy"></div>
      <div class="meta"><h3>${esc(mp.name)}</h3><span class="st mono">${c.st}</span></div>
      <p class="d">${c.d}</p></a>`;
  });
  html += '</div></section>';

  document.getElementById('proj').innerHTML = html;
})();
</script>
